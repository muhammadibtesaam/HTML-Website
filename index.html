<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ibtesaam Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav>
    <h2>Ibtesaam Store</h2>
    <div>
        <a href="#">Home</a>
        <a href="#fragrances">Fragrances</a>
        <a href="#shoes">Shoes</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<!-- ===== HERO ===== -->
<section class="hero">
    <h1>Welcome to Ibtesaam Store</h1>
    <p>Best Perfumes & Stylish Shoes in One Place</p>
</section>


<section id="fragrances">
    <h2>Fragrances Collection</h2>

    <div class="cards">

        <div class="card">
           
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRUJ8Rjd0y9xDigcqVzBzMcmvWbuf_aOYFAbA&s" />
            <h3>Body Spray</h3>
            <p>$40</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            
            <img src="https://www.coolandcool.pk/cdn/shop/files/26.jpg?v=1756821683" />
            <h3>Luxury Perfume</h3>
            <p>$70</p>
            <button>Add to Cart</button>
        </div>

    </div>
</section>


<section id="shoes">
    <h2>Shoes Collection</h2>

    <div class="cards">

        <div class="card">
            <!-- 📌 shoes image -->
            <img src="https://oshi.pk/cdn/shop/files/white-casual-sneaker-for-men-copy-16373-585_61362278-ffed-4322-8484-b4fde2b08ff4.jpg?crop=center&height=922&v=1734429348&width=922" />
            <h3>Running Shoes</h3>
            <p>$80</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTxv0gIGnNa7dev-G1fg0d23ZFnHgRqVFnh4A&s" />
            <h3>Casual Shoes</h3>
            <p>$60</p>
            <button>Add to Cart</button>
        </div>

    </div>
</section>


<section id="contact">
    <h2>Contact Us</h2>

    <form>
        <input type="text" placeholder="Your Name"><br>
        <input type="email" placeholder="Your Email"><br>
        <textarea placeholder="Message"></textarea><br>
        <button>Send Message</button>
    </form>
</section>


<footer>
    <p>© 2026 Ibtesaam Store | All Rights Reserved</p>
</footer>

</body>
</html>
